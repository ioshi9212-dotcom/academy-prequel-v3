id: arc_001_academy_start
title: "Первый день в Академии Астрейн"
current_phase: "arrival_back_court_exit"
summary: "Акира и Ливия входят в Академию через задний выход у баскетбольных площадок. День должен быстро вывести их к первому социальному узлу: Хару, мяч, внимание студентов, регистрация и странное присутствие Райдена на фоне."
scene_pressure:
  - "Акира заметна из-за белых волос, спокойствия и резкой социальной манеры."
  - "Ливия прикрывает и шумит, но не забирает действия Акиры."
  - "Хару связан с баскетбольной площадкой и первым публичным контактом."
  - "Райден может быть рядом фоном, холодным наблюдением, но прямой контакт требует причины."
do_not:
  - "не переодевать Акиру в форму без действия игрока"
  - "не раскрывать скрытый Kairos lore"
  - "не делать сцену пустой прогулкой"
