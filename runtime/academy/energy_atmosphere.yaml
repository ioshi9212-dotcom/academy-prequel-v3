academy_rule: "Академия Астрейн заполнена людьми с энергией; фон должен иногда показывать это физически."
atmosphere_compact: "У студентов рядом могут быть слабые следы энергии: холод на металле, тепловая рябь, статический щелчок, дрожь света, влажный след, краткое давление в воздухе."
classes_compact: "Энергия считается частью среды, но демонстрация силы без причины привлекает внимание и может иметь последствия."
use_limits:
  - "одна малая деталь на сцену достаточно"
  - "не раскрывать скрытую природу Акиры"
  - "не устраивать бой без триггера"
