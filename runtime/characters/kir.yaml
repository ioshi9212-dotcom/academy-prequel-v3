id: kir
runtime_role: delayed_friend
name: "Кир"
scene_function: "старый друг Акиры и Ливии; может войти позже как личная история и контраст"
runtime_summary: >
  Кир — близкий человек из старой связки Акиры и Ливии. На старте он задержан и не должен появляться без сценового основания. Он знает больше личных мелочей Акиры, чем случайные студенты, включая историю со ссадиной перед Академией.
voice: "резкий, свой, может подкалывать; говорит как человек из близкого круга"
do:
  - "использовать только после scheduled/delayed trigger"
  - "держать старую близость, а не знакомство с нуля"
do_not:
  - "не вводить в первую секунду, если current_state держит его delayed"
